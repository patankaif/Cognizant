version: "3.9"

services:
  catalog-service:
    build:
      context: ./src/CatalogService
    container_name: catalog-service
    ports:
      - "5081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    networks:
      - microservices-net

  orders-service:
    build:
      context: ./src/OrdersService
    container_name: orders-service
    ports:
      - "5082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - Services__CatalogServiceBaseUrl=http://catalog-service:8080
    depends_on:
      - catalog-service
    networks:
      - microservices-net

  api-gateway:
    build:
      context: ./src/ApiGateway
    container_name: api-gateway
    ports:
      - "5080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ReverseProxy__Clusters__catalog-cluster__Destinations__catalog-destination__Address=http://catalog-service:8080/
      - ReverseProxy__Clusters__orders-cluster__Destinations__orders-destination__Address=http://orders-service:8080/
    depends_on:
      - catalog-service
      - orders-service
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
