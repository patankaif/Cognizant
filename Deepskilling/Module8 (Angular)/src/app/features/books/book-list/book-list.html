<div class="book-list-page">
  <header>
    <h1>Book Catalog</h1>
    <a *ngIf="authService.isAdmin()" routerLink="/books/new" class="new-book-link">+ Add Book</a>
  </header>

  <input
    type="text"
    [formControl]="searchControl"
    placeholder="Search by title or author..."
    class="search-box"
  />

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <ng-container *ngIf="books$ | async as books; else loading">
    <p *ngIf="books.length === 0">No books match your search.</p>

    <app-book-card
      *ngFor="let book of books; trackBy: trackByBookId"
      [book]="book"
      [showActions]="authService.isAdmin()"
      (select)="onSelectBook($event)"
      (remove)="onDeleteBook($event)"
    ></app-book-card>
  </ng-container>

  <ng-template #loading>
    <p>Loading books...</p>
  </ng-template>
</div>
